---
- name: Setup AlmaLinux 9 workstation
  hosts: workstations
  become: yes
  vars:
    target_user: matteo
    nfs_server: "{{ nfs_server | default('192.168.1.10') }}"
    ssh_key_source: "{{ ssh_key_source | default('/mnt/downloads/ssh/optimus-prime') }}"
    nfs_mounts:
      - src: "{{ nfs_server }}:/mnt/downloads"
        path: /mnt/downloads
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/data"
        path: /mnt/data
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/MovieAndTvShows"
        path: /mnt/MovieAndTvShows
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/MovieAndTvShows/Movies"
        path: /mnt/MovieAndTvShows/Movies
        opts: defaults,_netdev,ro
      - src: "{{ nfs_server }}:/mnt/MovieAndTvShows/TvShows"
        path: /mnt/MovieAndTvShows/TvShows
        opts: defaults,_netdev,ro
      - src: "{{ nfs_server }}:/mnt/data/docker_persistent/immich"
        path: /mnt/data/docker_persistent/immich
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/data/docker_persistent/nextcloud"
        path: /mnt/data/docker_persistent/nextcloud
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/data/docker_persistent/volumetest"
        path: /mnt/data/docker_persistent/volumetest
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/data/Matteo_And_Manu/Pictures"
        path: /mnt/data/Matteo_And_Manu/Pictures
        opts: defaults,_netdev,ro
    packages:
      - podman
      - samba
      - samba-client
      - nfs-utils
      - cockpit
      - cockpit-podman
      - cockpit-storaged
      - cockpit-networkmanager
      - cockpit-packagekit
      - policycoreutils-python-utils
      - fastfetch
      - btop
      - nvtop
      - epel-release

  tasks:
    # =========================================================
    # 1. Add user to sudoers (wheel group)
    # =========================================================
    - name: Add {{ target_user }} to wheel group for sudo access
      user:
        name: "{{ target_user }}"
        groups: wheel
        append: yes

    # =========================================================
    # 2. Enable cockpit
    # =========================================================
    - name: Enable and start cockpit socket
      systemd:
        name: cockpit.socket
        enabled: yes
        state: started

    # =========================================================
    # 3. Install EPEL repository
    # =========================================================
    - name: Install EPEL release
      dnf:
        name: epel-release
        state: present

    # =========================================================
    # 4. Install packages
    # =========================================================
    - name: Install required packages
      dnf:
        name: "{{ packages }}"
        state: present

    # =========================================================
    # 5. NVIDIA driver (580 legacy for GTX 1080 Ti)
    # =========================================================
    - name: Add NVIDIA CUDA repository
      yum_repository:
        name: cuda-rhel9
        description: NVIDIA CUDA repository for RHEL 9
        baseurl: https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/
        gpgcheck: yes
        gpgkey: https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/D42D0685.pub
        enabled: yes

    - name: Install NVIDIA 580 legacy DKMS driver
      dnf:
        name: "@nvidia-driver:580-dkms"
        state: present
      notify: reboot required

    # =========================================================
    # 6. NFS mounts
    # =========================================================
    - name: Create NFS mount directories
      file:
        path: "{{ item.path }}"
        state: directory
        mode: "0755"
      loop: "{{ nfs_mounts }}"

    - name: Mount NFS shares and add to fstab
      mount:
        src: "{{ item.src }}"
        path: "{{ item.path }}"
        fstype: nfs
        opts: "{{ item.opts }}"
        state: mounted
      loop: "{{ nfs_mounts }}"

    # =========================================================
    # 7. SSH keys setup
    # =========================================================
    - name: Create .ssh directory for {{ target_user }}
      file:
        path: "/home/{{ target_user }}/.ssh"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0700"

    - name: Copy SSH private key
      copy:
        src: "{{ ssh_key_source }}/optimusprime_id_rsa"
        dest: "/home/{{ target_user }}/.ssh/id_rsa"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0600"
        remote_src: yes

    - name: Copy SSH public key
      copy:
        src: "{{ ssh_key_source }}/optimusprime_id_rsa.pub"
        dest: "/home/{{ target_user }}/.ssh/id_rsa.pub"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        remote_src: yes

    - name: Add public key to authorized_keys
      authorized_key:
        user: "{{ target_user }}"
        key: "{{ lookup('file', ssh_key_source + '/optimusprime_id_rsa.pub') }}"
        state: present

    # =========================================================
    # 8. Fastfetch for all users on login
    # =========================================================
    - name: Enable fastfetch on login for all users
      copy:
        content: "fastfetch\n"
        dest: /etc/profile.d/fastfetch.sh
        mode: "0755"

    # =========================================================
    # 9. OpenClaw workspace directory
    # =========================================================
    - name: Create OpenClaw workspace directory
      file:
        path: "/home/{{ target_user }}/openclaw-workspace"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: Create OpenClaw persistent config directory
      file:
        path: "/home/{{ target_user }}/docker_persistent/openclaw/config"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0700"

    # =========================================================
    # 10. Node Exporter for Prometheus monitoring
    # =========================================================
    - name: Create node-exporter quadlet
      copy:
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          Requires=network-online.target

          [Container]
          ContainerName=node-exporter
          Image=quay.io/prometheus/node-exporter:latest
          PublishPort=9100:9100
          SecurityLabelDisable=true
          Volume=/etc/localtime:/etc/localtime:ro
          Volume=/:/host:ro,rslave
          PodmanArgs=--pid=host
          Exec=--path.rootfs=/host --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

          AutoUpdate=registry

          [Service]
          Restart=always

          [Install]
          WantedBy=default.target
        dest: /etc/containers/systemd/node-exporter.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start node-exporter
      systemd:
        name: node-exporter.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 11. Open firewall port for node-exporter
    # =========================================================
    - name: Allow node-exporter port in firewall
      firewalld:
        port: 9100/tcp
        permanent: yes
        state: enabled
        immediate: yes

    # =========================================================
    # 12. Telegram notifications (telegram-send)
    # =========================================================
    - name: Install telegram-send dependencies
      pip:
        name:
          - python-telegram-bot==21.10
          - httpx==0.28.1
          - telegram-send
        state: present
        executable: pip3

    - name: Deploy notify-failure@ template service
      copy:
        content: |
          [Unit]
          Description=Send Telegram notification on service failure

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/telegram-send --config /etc/telegram-send.conf "[{{ inventory_hostname }}] Service %i FAILED"
        dest: /etc/systemd/system/notify-failure@.service
        mode: "0644"
      notify: reload systemd

    - name: Deploy reboot notification service
      copy:
        content: |
          [Unit]
          Description=Send Telegram notification on system reboot
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/telegram-send --config /etc/telegram-send.conf "[{{ inventory_hostname }}] System has rebooted and is starting services"

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/notify-reboot.service
        mode: "0644"
      notify: reload systemd

    - name: Enable reboot notification service
      systemd:
        name: notify-reboot.service
        daemon_reload: yes
        enabled: yes

    - name: Deploy podman auto-update notification service
      copy:
        content: |
          [Unit]
          Description=Podman auto-update with Telegram notification
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/bin/bash -c '\
            output=$(/usr/bin/podman auto-update 2>&1); \
            rc=$$?; \
            updated=$$(echo "$$output" | grep -c "true" || true); \
            if [ "$$updated" -gt 0 ]; then \
              /usr/local/bin/telegram-send --config /etc/telegram-send.conf "[{{ inventory_hostname }}] podman auto-update: $$updated container(s) updated"; \
            else \
              /usr/local/bin/telegram-send --config /etc/telegram-send.conf "[{{ inventory_hostname }}] podman auto-update: all containers up to date"; \
            fi; \
            exit $$rc'
        dest: /etc/systemd/system/podman-auto-update-notify.service
        mode: "0644"
      notify: reload systemd

    - name: Deploy podman auto-update notification timer
      copy:
        content: |
          [Unit]
          Description=Podman auto-update with notification timer

          [Timer]
          OnCalendar=daily
          RandomizedDelaySec=900
          Persistent=true

          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/podman-auto-update-notify.timer
        mode: "0644"
      notify: reload systemd

    - name: Enable podman auto-update notification timer
      systemd:
        name: podman-auto-update-notify.timer
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 13. File Browser
    # =========================================================
    - name: Create File Browser persistent directories
      file:
        path: "/home/{{ target_user }}/docker_persistent/filebrowser/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      loop:
        - database
        - config

    - name: Create File Browser quadlet
      copy:
        content: |
          [Unit]
          OnFailure=notify-failure@%n.service
          Description=File Browser container
          Requires=network-online.target

          [Container]
          ContainerName=filebrowser
          Image=docker.io/filebrowser/filebrowser:s6
          PublishPort=8585:80
          Volume=/etc/localtime:/etc/localtime:ro
          Volume=/home/{{ target_user }}/docker_persistent/filebrowser/database:/database:Z
          Volume=/home/{{ target_user }}/docker_persistent/filebrowser/config:/config:Z
          Volume=/mnt/data:/srv/data:Z
          Volume=/mnt/downloads:/srv/downloads:Z
          Volume=/mnt/MovieAndTvShows:/srv/media:Z
          Volume=/home/{{ target_user }}:/srv/home:Z
          Volume=/home/{{ target_user }}/openclaw-workspace:/srv/openclaw-workspace:Z

          Environment=TZ=/etc/localtime
          Environment=PGID=1000
          Environment=PUID=1000

          AutoUpdate=registry

          Label=traefik.enable=true
          Label=traefik.http.routers.filebrowser.rule=Host(`filebrowser.bumblebee.favarohome.com`)
          Label=traefik.http.routers.filebrowser.entrypoints=websecure
          Label=traefik.http.routers.filebrowser.tls.certresolver=cloudflare
          Label=traefik.http.services.filebrowser.loadbalancer.server.port=80

          [Service]
          Restart=always

          [Install]
          WantedBy=default.target
        dest: /etc/containers/systemd/filebrowser.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start File Browser
      systemd:
        name: filebrowser.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 14. Stirling PDF
    # =========================================================
    - name: Create Stirling PDF persistent directories
      file:
        path: "/home/{{ target_user }}/docker_persistent/stirling-pdf/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      loop:
        - data
        - config
        - logs

    - name: Create Stirling PDF quadlet
      copy:
        content: |
          [Unit]
          OnFailure=notify-failure@%n.service
          Description=Stirling PDF - PDF manipulation tool
          Requires=network-online.target

          [Container]
          ContainerName=stirling-pdf
          Image=docker.io/stirlingtools/stirling-pdf:latest
          PublishPort=8484:8080
          Volume=/etc/localtime:/etc/localtime:ro
          Volume=/home/{{ target_user }}/docker_persistent/stirling-pdf/data:/usr/share/tessdata:Z
          Volume=/home/{{ target_user }}/docker_persistent/stirling-pdf/config:/configs:Z
          Volume=/home/{{ target_user }}/docker_persistent/stirling-pdf/logs:/logs:Z

          Environment=SECURITY_ENABLELOGIN=false
          Environment=SYSTEM_DEFAULTLOCALE=en-US

          AutoUpdate=registry

          Label=traefik.enable=true
          Label=traefik.http.routers.stirling-pdf.rule=Host(`stirling-pdf.bumblebee.favarohome.com`)
          Label=traefik.http.routers.stirling-pdf.entrypoints=websecure
          Label=traefik.http.routers.stirling-pdf.tls.certresolver=cloudflare
          Label=traefik.http.services.stirling-pdf.loadbalancer.server.port=8080

          [Service]
          Restart=always

          [Install]
          WantedBy=default.target
        dest: /etc/containers/systemd/stirling-pdf.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start Stirling PDF
      systemd:
        name: stirling-pdf.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 15. Cloud Drive Sync
    # =========================================================
    - name: Create Cloud Drive Sync persistent directories
      file:
        path: "/home/{{ target_user }}/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      loop:
        - docker_persistent/cloud-drive-sync/config
        - docker_persistent/cloud-drive-sync/data
        - gdrive-sync

    - name: Create Cloud Drive Sync quadlet
      copy:
        content: |
          [Unit]
          OnFailure=notify-failure@%n.service
          Description=Cloud Drive Sync - Google Drive sync daemon
          Requires=network-online.target

          [Container]
          ContainerName=cloud-drive-sync
          Image=ghcr.io/ciberkids/cloud-drive-sync:latest
          PublishPort=8090:8080
          Volume=/etc/localtime:/etc/localtime:ro
          Volume=/home/{{ target_user }}/docker_persistent/cloud-drive-sync/config:/root/.config/cloud-drive-sync:Z
          Volume=/home/{{ target_user }}/docker_persistent/cloud-drive-sync/data:/root/.local/share/cloud-drive-sync:Z
          Volume=/home/{{ target_user }}/gdrive-sync:/data/gdrive-sync:Z

          AutoUpdate=registry

          Label=traefik.enable=true
          Label=traefik.http.routers.cloud-drive-sync.rule=Host(`cloud-drive-sync.bumblebee.favarohome.com`)
          Label=traefik.http.routers.cloud-drive-sync.entrypoints=websecure
          Label=traefik.http.routers.cloud-drive-sync.tls.certresolver=cloudflare
          Label=traefik.http.services.cloud-drive-sync.loadbalancer.server.port=8080

          [Service]
          Restart=always

          [Install]
          WantedBy=default.target
        dest: /etc/containers/systemd/cloud-drive-sync.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start Cloud Drive Sync
      systemd:
        name: cloud-drive-sync.service
        daemon_reload: yes
        enabled: yes
        state: started

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
    - name: reboot required
      debug:
        msg: "NVIDIA driver installed - a reboot is required for the driver to load. Run 'reboot' when ready."
