---
- name: Setup AlmaLinux 9 workstation (Bumblebee)
  hosts: workstations
  become: yes
  vars:
    target_user: matteo
    nfs_server: "{{ nfs_server | default('192.168.1.10') }}"
    ssh_key_source: "{{ ssh_key_source | default('/mnt/downloads/ssh/optimus-prime') }}"
    quadlets_src: "{{ playbook_dir }}/../systemd/containers/system/bumblebee"
    nfs_mounts:
      - src: "{{ nfs_server }}:/mnt/downloads"
        path: /mnt/downloads
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/data"
        path: /mnt/data
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/MovieAndTvShows"
        path: /mnt/MovieAndTvShows
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/MovieAndTvShows/Movies"
        path: /mnt/MovieAndTvShows/Movies
        opts: defaults,_netdev,ro
      - src: "{{ nfs_server }}:/mnt/MovieAndTvShows/TvShows"
        path: /mnt/MovieAndTvShows/TvShows
        opts: defaults,_netdev,ro
      - src: "{{ nfs_server }}:/mnt/data/docker_persistent/immich"
        path: /mnt/data/docker_persistent/immich
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/data/docker_persistent/nextcloud"
        path: /mnt/data/docker_persistent/nextcloud
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/data/docker_persistent/volumetest"
        path: /mnt/data/docker_persistent/volumetest
        opts: defaults,_netdev
      - src: "{{ nfs_server }}:/mnt/data/Matteo_And_Manu/Pictures"
        path: /mnt/data/Matteo_And_Manu/Pictures
        opts: defaults,_netdev,ro
    packages:
      - podman
      - samba
      - samba-client
      - nfs-utils
      - cockpit
      - cockpit-podman
      - cockpit-storaged
      - cockpit-networkmanager
      - cockpit-packagekit
      - policycoreutils-python-utils
      - fastfetch
      - btop
      - nvtop
      - epel-release

  tasks:
    # =========================================================
    # 1. Add user to sudoers (wheel group)
    # =========================================================
    - name: Add {{ target_user }} to wheel group for sudo access
      user:
        name: "{{ target_user }}"
        groups: wheel
        append: yes

    # =========================================================
    # 2. Enable cockpit
    # =========================================================
    - name: Enable and start cockpit socket
      systemd:
        name: cockpit.socket
        enabled: yes
        state: started

    # =========================================================
    # 3. Install EPEL repository
    # =========================================================
    - name: Install EPEL release
      dnf:
        name: epel-release
        state: present

    # =========================================================
    # 4. Install packages
    # =========================================================
    - name: Install required packages
      dnf:
        name: "{{ packages }}"
        state: present

    # =========================================================
    # 5. NVIDIA driver (580 legacy for GTX 1080 Ti)
    # =========================================================
    - name: Add NVIDIA CUDA repository
      yum_repository:
        name: cuda-rhel9
        description: NVIDIA CUDA repository for RHEL 9
        baseurl: https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/
        gpgcheck: yes
        gpgkey: https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/D42D0685.pub
        enabled: yes

    - name: Install NVIDIA 580 legacy DKMS driver
      dnf:
        name: "@nvidia-driver:580-dkms"
        state: present
      notify: reboot required

    - name: Install dnf post-transaction-actions plugin
      dnf:
        name: python3-dnf-plugin-post-transaction-actions
        state: present

    - name: Deploy nvidia-reboot script
      copy:
        src: "{{ playbook_dir }}/../scripts/bumblebee/nvidia-reboot.sh"
        dest: /usr/local/sbin/nvidia-reboot.sh
        owner: root
        group: root
        mode: "0755"

    - name: Deploy nvidia-reboot DNF action
      copy:
        src: "{{ playbook_dir }}/../config/dnf/nvidia-reboot.action"
        dest: /etc/dnf/plugins/post-transaction-actions.d/nvidia-reboot.action
        owner: root
        group: root
        mode: "0644"

    # =========================================================
    # 6. NFS mounts
    # =========================================================
    - name: Create NFS mount directories
      file:
        path: "{{ item.path }}"
        state: directory
        mode: "0755"
      loop: "{{ nfs_mounts }}"

    - name: Mount NFS shares and add to fstab
      mount:
        src: "{{ item.src }}"
        path: "{{ item.path }}"
        fstype: nfs
        opts: "{{ item.opts }}"
        state: mounted
      loop: "{{ nfs_mounts }}"

    # =========================================================
    # 7. SSH keys setup
    # =========================================================
    - name: Create .ssh directory for {{ target_user }}
      file:
        path: "/home/{{ target_user }}/.ssh"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0700"

    - name: Copy SSH private key
      copy:
        src: "{{ ssh_key_source }}/optimusprime_id_rsa"
        dest: "/home/{{ target_user }}/.ssh/id_rsa"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0600"
        remote_src: yes

    - name: Copy SSH public key
      copy:
        src: "{{ ssh_key_source }}/optimusprime_id_rsa.pub"
        dest: "/home/{{ target_user }}/.ssh/id_rsa.pub"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        remote_src: yes

    - name: Add public key to authorized_keys
      authorized_key:
        user: "{{ target_user }}"
        key: "{{ lookup('file', ssh_key_source + '/optimusprime_id_rsa.pub') }}"
        state: present

    # =========================================================
    # 8. Fastfetch for all users on login
    # =========================================================
    - name: Enable fastfetch on login for all users
      copy:
        content: "fastfetch\n"
        dest: /etc/profile.d/fastfetch.sh
        mode: "0755"

    # =========================================================
    # 9. Telegram notifications (telegram-send)
    # =========================================================
    - name: Install telegram-send dependencies
      pip:
        name:
          - python-telegram-bot==21.10
          - httpx==0.28.1
          - telegram-send
        state: present
        executable: pip3

    - name: Deploy notify-failure@ template service
      copy:
        src: "{{ quadlets_src }}/notify-failure@.service"
        dest: /etc/systemd/system/notify-failure@.service
        mode: "0644"
      notify: reload systemd

    - name: Deploy notify-success@ template service
      copy:
        src: "{{ quadlets_src }}/notify-success@.service"
        dest: /etc/systemd/system/notify-success@.service
        mode: "0644"
      notify: reload systemd

    - name: Deploy reboot notification service
      copy:
        src: "{{ quadlets_src }}/notify-reboot.service"
        dest: /etc/systemd/system/notify-reboot.service
        mode: "0644"
      notify: reload systemd

    - name: Enable reboot notification service
      systemd:
        name: notify-reboot.service
        daemon_reload: yes
        enabled: yes

    - name: Deploy podman auto-update notification service
      copy:
        src: "{{ quadlets_src }}/podman-auto-update-notify.service"
        dest: /etc/systemd/system/podman-auto-update-notify.service
        mode: "0644"
      notify: reload systemd

    - name: Deploy podman auto-update notification timer
      copy:
        src: "{{ quadlets_src }}/podman-auto-update-notify.timer"
        dest: /etc/systemd/system/podman-auto-update-notify.timer
        mode: "0644"
      notify: reload systemd

    - name: Enable podman auto-update notification timer
      systemd:
        name: podman-auto-update-notify.timer
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 10. Secrets directory
    # =========================================================
    - name: Create secrets directory for container env files
      file:
        path: /etc/containers/secrets
        state: directory
        owner: root
        group: root
        mode: "0700"

    # =========================================================
    # 11. Node Exporter
    # =========================================================
    - name: Deploy node-exporter quadlet
      copy:
        src: "{{ quadlets_src }}/node-exporter.container"
        dest: /etc/containers/systemd/node-exporter.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start node-exporter
      systemd:
        name: node-exporter.service
        daemon_reload: yes
        enabled: yes
        state: started

    - name: Allow node-exporter port in firewall
      firewalld:
        port: 9100/tcp
        permanent: yes
        state: enabled
        immediate: yes

    - name: Allow podman-exporter port in firewall
      firewalld:
        port: 9882/tcp
        permanent: yes
        state: enabled
        immediate: yes

    # =========================================================
    # 12. Traefik
    # =========================================================
    - name: Create Traefik persistent directory
      file:
        path: "/home/{{ target_user }}/docker_persistent/traefik"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: Create Traefik acme.json if not present
      file:
        path: "/home/{{ target_user }}/docker_persistent/traefik/acme.json"
        state: touch
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0600"

    - name: Deploy Traefik quadlet
      copy:
        src: "{{ quadlets_src }}/traefik.container"
        dest: /etc/containers/systemd/traefik.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start Traefik
      systemd:
        name: traefik.service
        daemon_reload: yes
        enabled: yes
        state: started

    - name: Allow HTTP in firewall
      firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes

    - name: Allow HTTPS in firewall
      firewalld:
        service: https
        permanent: yes
        state: enabled
        immediate: yes

    # =========================================================
    # 13. Heimdall
    # =========================================================
    - name: Create Heimdall persistent directory
      file:
        path: "/home/{{ target_user }}/docker_persistent/heimdall"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: Deploy Heimdall quadlet
      copy:
        src: "{{ quadlets_src }}/heimdall.container"
        dest: /etc/containers/systemd/heimdall.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start Heimdall
      systemd:
        name: heimdall.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 14. Ollama
    # =========================================================
    - name: Create Ollama persistent directory
      file:
        path: "/home/{{ target_user }}/docker_persistent/ollama"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: Deploy Ollama quadlet
      copy:
        src: "{{ quadlets_src }}/ollama.container"
        dest: /etc/containers/systemd/ollama.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start Ollama
      systemd:
        name: ollama.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 15. Open WebUI
    # =========================================================
    - name: Create Open WebUI persistent directory
      file:
        path: "/home/{{ target_user }}/docker_persistent/open-webui"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: Deploy Open WebUI quadlet
      copy:
        src: "{{ quadlets_src }}/open-webui.container"
        dest: /etc/containers/systemd/open-webui.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start Open WebUI
      systemd:
        name: open-webui.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 16. SearXNG
    # =========================================================
    - name: Create SearXNG persistent directory
      file:
        path: "/home/{{ target_user }}/docker_persistent/searxng"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: Deploy SearXNG quadlet
      copy:
        src: "{{ quadlets_src }}/searxng.container"
        dest: /etc/containers/systemd/searxng.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start SearXNG
      systemd:
        name: searxng.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 17. File Browser
    # =========================================================
    - name: Create File Browser persistent directories
      file:
        path: "/home/{{ target_user }}/docker_persistent/filebrowser/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      loop:
        - database
        - config

    - name: Deploy File Browser quadlet
      copy:
        src: "{{ quadlets_src }}/filebrowser.container"
        dest: /etc/containers/systemd/filebrowser.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start File Browser
      systemd:
        name: filebrowser.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 18. Stirling PDF
    # =========================================================
    - name: Create Stirling PDF persistent directories
      file:
        path: "/home/{{ target_user }}/docker_persistent/stirling-pdf/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      loop:
        - data
        - config
        - logs

    - name: Deploy Stirling PDF quadlet
      copy:
        src: "{{ quadlets_src }}/stirling-pdf.container"
        dest: /etc/containers/systemd/stirling-pdf.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start Stirling PDF
      systemd:
        name: stirling-pdf.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 19. Cloud Drive Sync
    # =========================================================
    - name: Create Cloud Drive Sync persistent directories
      file:
        path: "/home/{{ target_user }}/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      loop:
        - docker_persistent/cloud-drive-sync/config
        - docker_persistent/cloud-drive-sync/data
        - gdrive-sync

    - name: Deploy Cloud Drive Sync quadlet
      copy:
        src: "{{ quadlets_src }}/cloud-drive-sync.container"
        dest: /etc/containers/systemd/cloud-drive-sync.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start Cloud Drive Sync
      systemd:
        name: cloud-drive-sync.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 20. n8n
    # =========================================================
    - name: Create n8n persistent directory
      file:
        path: "/home/{{ target_user }}/docker_persistent/n8n"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: Deploy n8n quadlet
      copy:
        src: "{{ quadlets_src }}/n8n.container"
        dest: /etc/containers/systemd/n8n.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start n8n
      systemd:
        name: n8n.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 21. OpenCode
    # =========================================================
    - name: Create OpenCode persistent directories
      file:
        path: "/home/{{ target_user }}/docker_persistent/opencode/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      loop:
        - home
        - repos
        - local-bin

    - name: Deploy OpenCode quadlet
      copy:
        src: "{{ quadlets_src }}/opencode.container"
        dest: /etc/containers/systemd/opencode.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start OpenCode
      systemd:
        name: opencode.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 22. OpenClaw
    # =========================================================
    - name: Create OpenClaw persistent directories
      file:
        path: "/home/{{ target_user }}/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      loop:
        - openclaw-workspace
        - docker_persistent/openclaw/config
        - docker_persistent/openclaw/bin

    - name: Deploy OpenClaw quadlet
      copy:
        src: "{{ quadlets_src }}/openclaw.container"
        dest: /etc/containers/systemd/openclaw.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start OpenClaw
      systemd:
        name: openclaw.service
        daemon_reload: yes
        enabled: yes
        state: started

    # =========================================================
    # 23. ComfyUI
    # NOTE: Auto-start is disabled in the quadlet. Start manually:
    #       sudo systemctl start comfyui
    # =========================================================
    - name: Create ComfyUI persistent directories
      file:
        path: "/home/{{ target_user }}/docker_persistent/comfyui/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      loop:
        - run
        - basedir

    - name: Deploy ComfyUI quadlet
      copy:
        src: "{{ quadlets_src }}/comfyui.container"
        dest: /etc/containers/systemd/comfyui.container
        mode: "0644"
      notify: reload systemd

    # =========================================================
    # 24. ComfyUI Launcher
    # =========================================================
    - name: Create ComfyUI Launcher persistent directory
      file:
        path: "/home/{{ target_user }}/docker_persistent/comfyui-launcher"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: Deploy ComfyUI Launcher quadlet
      copy:
        src: "{{ quadlets_src }}/comfyui-launcher.container"
        dest: /etc/containers/systemd/comfyui-launcher.container
        mode: "0644"
      notify: reload systemd

    - name: Enable and start ComfyUI Launcher
      systemd:
        name: comfyui-launcher.service
        daemon_reload: yes
        enabled: yes
        state: started

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
    - name: reboot required
      debug:
        msg: "NVIDIA driver installed - a reboot is required for the driver to load. Run 'reboot' when ready."
