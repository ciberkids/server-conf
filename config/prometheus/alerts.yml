groups:
  - name: service_availability
    rules:
      - alert: ServiceDown
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} is DOWN"
          description: "{{ $labels.instance }} has been unreachable for more than 2 minutes"

  - name: ssl_certificates
    rules:
      - alert: SSLCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL cert expiring: {{ $labels.instance }}"
          description: "Certificate for {{ $labels.instance }} expires in {{ printf \"%.0f\" $value }} days"

      - alert: SSLCertExpiringCritical
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 3
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "SSL cert expiring SOON: {{ $labels.instance }}"
          description: "Certificate for {{ $labels.instance }} expires in {{ printf \"%.0f\" $value }} days — renew immediately"
