; Override www.conf — cap workers and prevent runaway requests from starving web UI
; Deploy to: /mnt/data/docker_persistent/nextcloud/php/www2.conf

[www]
pm = dynamic
pm.max_children = 6
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

; Kill any single request running longer than 3 minutes
request_terminate_timeout = 180

; Hard PHP CPU-time limit per request (seconds). Kills scripts in tight loops
; even if they haven't hit request_terminate_timeout yet.
; Note: this measures CPU time, so a 2-min CPU-heavy PROPFIND dies here first.
php_admin_value[max_execution_time] = 120

; Stop running when the client disconnects (nginx closes FastCGI socket)
php_admin_value[ignore_user_abort] = 0

; Log a full PHP backtrace for any request still running after 30s, so future
; runaway requests (see cloud-drive-sync#47) are diagnosable in seconds instead
; of guesswork. Logs to /config/log/php/slow.log; does NOT kill the request
; (request_terminate_timeout/max_execution_time handle that).
slowlog = /config/log/php/slow.log
request_slowlog_timeout = 30
