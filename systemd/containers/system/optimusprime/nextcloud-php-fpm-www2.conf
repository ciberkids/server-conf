; Override www.conf — cap workers to prevent post-boot background jobs from starving web requests
; Deploy to: /mnt/data/docker_persistent/nextcloud/php/www2.conf

[www]
pm = dynamic
pm.max_children = 3
pm.start_servers = 1
pm.min_spare_servers = 1
pm.max_spare_servers = 2
pm.max_requests = 500

; Kill any single request running longer than 15 minutes
request_terminate_timeout = 900
